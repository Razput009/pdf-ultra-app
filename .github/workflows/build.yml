name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install compatible Gradle
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.14.2-bin.zip -P /tmp
        unzip -q -d $HOME/gradle-dist /tmp/gradle-8.14.2-bin.zip
        echo "$HOME/gradle-dist/gradle-8.14.2/bin" >> $GITHUB_PATH
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: "18"
    - uses: actions/setup-java@v3
      with:
        java-version: "17"
        distribution: "temurin"
    - uses: android-actions/setup-android@v2
    - run: npm install -g cordova@12
    - run: cordova platform add android@12
    - name: Install Android build-tools 33.0.2
      run: yes | sdkmanager "build-tools;33.0.2"
    - run: cordova build android
    - uses: actions/upload-artifact@v4
      with:
        name: PDF-Ultra-APK
        path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
